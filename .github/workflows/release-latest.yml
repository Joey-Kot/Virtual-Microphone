name: Build and publish Latest

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Check license notices
        shell: pwsh
        run: |
          foreach ($file in @(
            'NOTICE',
            'THIRD_PARTY_NOTICES.md',
            'THIRD_PARTY_LICENSES/noise-suppression-for-voice-GPL-3.0-or-later.txt',
            'THIRD_PARTY_LICENSES/RNNoise-BSD-3-Clause.txt',
            'THIRD_PARTY_LICENSES/FST-GPL-3.0-or-later.txt',
            'THIRD_PARTY_LICENSES/JUCE-GPL-3.0-or-later.txt'
          )) {
            if (-not (Test-Path $file -PathType Leaf)) {
              throw "Missing required license file: $file"
            }
          }
          Select-String -Path THIRD_PARTY_NOTICES.md -Pattern 'noise-suppression-for-voice', 'RNNoise', 'FST', 'JUCE' |
            Out-Null

      - name: Configure RNNoise VST2 build
        run: >-
          cmake -S vendor/noise-suppression-for-voice -B build-rnnoise
          -DBUILD_TESTS=OFF
          -DBUILD_VST_PLUGIN=ON
          -DBUILD_VST3_PLUGIN=OFF
          -DBUILD_LV2_PLUGIN=OFF
          -DBUILD_LADSPA_PLUGIN=OFF
          -DBUILD_AU_PLUGIN=OFF
          -DBUILD_AUV3_PLUGIN=OFF
          -DCMAKE_BUILD_TYPE=Release

      - name: Build RNNoise mono VST2 plugin
        run: cmake --build build-rnnoise --config Release --parallel

      - name: Configure Virtual Microphone build
        run: cmake -S . -B build-app -A x64

      - name: Build Virtual Microphone
        run: cmake --build build-app --config Release --parallel

      - name: Assemble release files
        shell: pwsh
        run: |
          $plugin = Get-ChildItem -Path build-rnnoise -Filter rnnoise_mono.dll -Recurse |
            Select-Object -First 1
          if ($null -eq $plugin) {
            throw 'rnnoise_mono.dll was not produced by the VST2 build.'
          }
          $application = Get-ChildItem -Path build-app -Filter virtual-microphone.exe -Recurse |
            Select-Object -First 1
          if ($null -eq $application) {
            throw 'virtual-microphone.exe was not produced by the application build.'
          }
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          Copy-Item $plugin.FullName dist/rnnoise_mono.dll
          Copy-Item $application.FullName dist/virtual-microphone.exe
          Copy-Item virtual-microphone.ini.example dist/virtual-microphone.ini.example
          Copy-Item virtual-microphone-restart.ps1 dist/virtual-microphone-restart.ps1
          Copy-Item README.md, LICENSE, NOTICE, THIRD_PARTY_NOTICES.md dist/
          Copy-Item THIRD_PARTY_LICENSES dist/THIRD_PARTY_LICENSES -Recurse
          Compress-Archive -Path dist/* -DestinationPath Virtual-Microphone-Latest.zip -Force
          $hash = (Get-FileHash -Path Virtual-Microphone-Latest.zip -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  Virtual-Microphone-Latest.zip" |
            Set-Content -Path Virtual-Microphone-Latest.zip.sha256 -Encoding ascii -NoNewline

      - name: Move Latest tag to this build
        shell: pwsh
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git tag --force Latest $env:GITHUB_SHA
          git push origin refs/tags/Latest --force

      - name: Remove legacy single-file release assets
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          $assets = gh release view Latest --json assets --jq '.assets[].name'
          if ($LASTEXITCODE -eq 0) {
            foreach ($asset in @(
              'virtual-microphone.exe',
              'rnnoise_mono.dll',
              'virtual-microphone.ini.example',
              'virtual-microphone-restart.ps1'
            )) {
              if ($assets -contains $asset) {
                gh release delete-asset Latest $asset --yes
              }
            }
          }

      - name: Create or overwrite Latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: Latest
          name: Latest
          target_commitish: ${{ github.sha }}
          make_latest: true
          generate_release_notes: true
          files: |
            Virtual-Microphone-Latest.zip
            Virtual-Microphone-Latest.zip.sha256
          overwrite_files: true
